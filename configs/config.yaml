grok:
  base_url: "https://api.x.ai/v1"
  model: "grok-4.20-vision"
  max_tokens: 600
  temperature: 0.4
  timeout_seconds: 8

gemini:
  # 무료 티어 가능 모델 (2026 기준):
  #   - "gemini-2.5-pro"    : 품질 최고, 무료 티어 rate limit 낮음
  #   - "gemini-2.5-flash"  : 빠르고 무료 티어 여유 있음 (실시간 코칭에 추천)
  model: "gemini-2.5-flash"
  max_tokens: 600
  temperature: 0.4
  timeout_seconds: 15

logging:
  level: "INFO"
  file: "logs/coach.log"
